<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>RED — Red Encriptada Descentralizada</title>
  <link rel="stylesheet" href="/app.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">🔴</div>
    <div class="loading-title">RED</div>
    <div class="loading-sub">Conectando al nodo...</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">🔴</div>
        <div class="logo-text">RED</div>
        <div class="status-dot" id="status-dot" title="Conectado"></div>
      </div>

      <div class="identity-card">
        <div class="identity-label">Tu identidad</div>
        <div class="identity-hash" id="identity-hash">—</div>
        <div class="identity-short" id="identity-short">—</div>
        <button class="copy-btn" onclick="copyIdentity()" title="Copiar">⎘ Copiar</button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="setView('conversations')" id="nav-conversations">
          💬 Mensajes
        </button>
        <button class="nav-btn" onclick="setView('contacts')" id="nav-contacts">
          👥 Contactos
        </button>
        <button class="nav-btn" onclick="setView('groups')" id="nav-groups">
          🔒 Grupos
        </button>
        <button class="nav-btn" onclick="setView('status')" id="nav-status">
          📡 Estado
        </button>
      </nav>

      <!-- List Panel -->
      <div class="list-panel" id="list-panel">
        <div class="list-header" id="list-header">
          <span>Conversaciones</span>
          <button class="add-btn" id="add-btn" onclick="showNewConversation()">+</button>
        </div>
        <div class="list-items" id="list-items">
          <div class="empty-state">Sin conversaciones todavía</div>
        </div>
      </div>
    </aside>

    <!-- Main Panel -->
    <main class="main-panel">
      <!-- Chat View -->
      <div id="view-chat" class="view active">
        <div class="chat-header" id="chat-header">
          <div class="chat-placeholder-icon">🔴</div>
          <div class="chat-placeholder-title">RED — Mensajería Privada</div>
          <div class="chat-placeholder-sub">Selecciona una conversación o crea una nueva</div>
        </div>
        <div class="messages-area" id="messages-area"></div>
        <div class="input-area" id="input-area" style="display:none">
          <input id="msg-input" class="msg-input" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
          <button class="send-btn" onclick="sendMessage()">→</button>
        </div>
      </div>

      <!-- Status View -->
      <div id="view-status" class="view">
        <div class="view-title">📡 Estado del Nodo</div>
        <div class="status-grid" id="status-grid">
          <div class="stat-card"><div class="stat-val" id="st-running">—</div><div class="stat-label">Estado</div></div>
          <div class="stat-card"><div class="stat-val" id="st-peers">—</div><div class="stat-label">Peers</div></div>
          <div class="stat-card"><div class="stat-val" id="st-version">—</div><div class="stat-label">Versión</div></div>
        </div>
      </div>

      <!-- Contacts View -->
      <div id="view-contacts" class="view">
        <div class="view-title">👥 Contactos</div>
        <div class="form-card">
          <div class="form-label">Añadir contacto</div>
          <input id="new-contact-hash" class="form-input" type="text" placeholder="Identity hash (64 hex chars)" />
          <input id="new-contact-name" class="form-input" type="text" placeholder="Nombre" />
          <button class="form-btn" onclick="addContact()">Añadir Contacto</button>
        </div>
        <div id="contacts-list" class="contact-list"></div>
      </div>

      <!-- Groups View -->
      <div id="view-groups" class="view">
        <div class="view-title">🔒 Grupos Cifrados</div>
        <div class="form-card">
          <div class="form-label">Crear grupo</div>
          <input id="new-group-name" class="form-input" type="text" placeholder="Nombre del grupo" />
          <button class="form-btn" onclick="createGroup()">Crear Grupo</button>
        </div>
        <div id="groups-list" class="group-list"></div>
      </div>
    </main>
  </div>

  <!-- New Conversation Modal -->
  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Nueva Conversación</div>
      <input id="modal-recipient" class="form-input" type="text" placeholder="Identity hash del destinatario" />
      <input id="modal-first-msg" class="form-input" type="text" placeholder="Primer mensaje" />
      <div class="modal-actions">
        <button class="form-btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="form-btn" onclick="startConversation()">Enviar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
